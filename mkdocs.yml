site_name: ScanReady Documentation
site_url: https://marioschiano.github.io/scanready-docs/

theme:
  name: material
  language: en
  icon:
    alternate: material/earth
  palette:
    scheme: slate
    primary: green
    accent: lime

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: it
          name: Italiano
          build: true
          nav_translations:
            Home: Home
            Why ScanReady: Perche ScanReady
            Getting Started: Per iniziare
            Installation: Installazione
            Quick Start: Guida rapida
            One Click Bake: One Click Bake
            Workflow: Workflow
            Step 1 - Preview / Reduce: Step 1 - Preview / Reduce
            Step 2 - UV / Cage: Step 2 - UV / Cage
            Step 3 - Bake / Output: Step 3 - Bake / Output
            Advanced: Avanzate
            Advanced Settings: Impostazioni avanzate
            Settings Reference: Riferimento impostazioni
            Export Tips: Consigli export
            Use Cases: Casi d'uso
            Support: Supporto
            Changelog: Changelog
            FAQ: FAQ
            Troubleshooting: Risoluzione problemi

extra:
  alternate:
    - name: English
      link: /scanready-docs/
      lang: en
    - name: Italiano
      link: /scanready-docs/it/
      lang: it

nav:
  - Home: index.md
  - Why ScanReady: why-scanready.md

  - Getting Started:
      - Installation: installation.md
      - Quick Start: quick-start.md
      - One Click Bake: one-click.md

  - Workflow:
      - Step 1 - Preview / Reduce: step1.md
      - Step 2 - UV / Cage: step2.md
      - Step 3 - Bake / Output: step3.md

  - Advanced:
      - Advanced Settings: advanced.md
      - Settings Reference: settings-reference.md
      - Export Tips: export-tips.md
      - Use Cases: use-cases.md

  - Support:
      - Changelog: changelog.md
      - FAQ: faq.md
      - Troubleshooting: troubleshooting.md
      - Support: support.md
