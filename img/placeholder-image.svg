<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">ScanReady documentation image placeholder</title>
  <desc id="desc">Temporary placeholder for a screenshot or animated GIF.</desc>
  <rect width="1200" height="675" fill="#20242c"/>
  <rect x="36" y="36" width="1128" height="603" rx="18" fill="#252a33" stroke="#4a5260" stroke-width="3" stroke-dasharray="18 14"/>
  <g fill="#a9ff3f">
    <rect x="122" y="150" width="956" height="52" rx="10" opacity="0.18"/>
    <rect x="122" y="236" width="760" height="28" rx="8" opacity="0.28"/>
    <rect x="122" y="292" width="888" height="28" rx="8" opacity="0.22"/>
    <rect x="122" y="348" width="640" height="28" rx="8" opacity="0.18"/>
  </g>
  <g fill="#f2f4f8" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="600" y="470" font-size="42" font-weight="700">ScanReady image placeholder</text>
    <text x="600" y="524" font-size="26" fill="#c5cad3">Replace this file reference with the final screenshot or GIF</text>
